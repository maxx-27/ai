<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Max AI | Intelligent Interface</title>
    <meta name="description" content="Max AI - Premium AI Assistant powered by ChatGPT & Gemini">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <!-- ====== Animated Background ====== -->
    <div class="bg-canvas" id="bgCanvas">
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>
        <div class="bg-gradient-3"></div>
        <div class="bg-grid"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- ====== App Layout ====== -->
    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-icon">
                        <span class="material-symbols-rounded">neurology</span>
                    </div>
                    <div class="brand-text">
                        <span class="brand-name">Max AI</span>
                        <span class="brand-tag">Intelligence</span>
                    </div>
                </div>
                <button class="sidebar-close-btn" id="sidebarCloseBtn">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>

            <button class="new-thread-btn" id="newThreadBtn">
                <span class="material-symbols-rounded">add</span>
                <span>New Thread</span>
                <kbd>Ctrl+N</kbd>
            </button>

            <div class="sidebar-section">
                <p class="sidebar-label">Recent</p>
                <div class="history-list" id="historyList">
                    <p class="history-empty">No conversations yet</p>
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="api-indicator" id="apiIndicator">
                    <div class="api-dot"></div>
                    <span>Checking...</span>
                </div>
            </div>
        </aside>

        <!-- Sidebar overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main -->
        <main class="main">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="header-btn menu-btn" id="menuBtn">
                        <span class="material-symbols-rounded">menu</span>
                    </button>
                    <h1 class="header-title">
                        <span class="title-gradient">Max AI</span>
                    </h1>
                </div>
                <div class="header-right">
                    <button class="header-btn" id="clearBtn" title="Clear chat">
                        <span class="material-symbols-rounded">delete_sweep</span>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-area" id="chatArea">
                <!-- Welcome -->
                <div class="welcome" id="welcomeScreen">
                    <div class="welcome-orb">
                        <div class="orb-ring orb-ring-1"></div>
                        <div class="orb-ring orb-ring-2"></div>
                        <div class="orb-ring orb-ring-3"></div>
                        <div class="orb-core">
                            <span class="material-symbols-rounded">auto_awesome</span>
                        </div>
                    </div>
                    <h2 class="welcome-heading">What can I help you with<span class="blink">?</span></h2>
                    <p class="welcome-sub">Powered by ChatGPT & Gemini — Choose your mode below</p>
                    <div class="suggestions" id="suggestions">
                        <button class="suggest-card" data-prompt="Jelaskan konsep quantum computing untuk pemula">
                            <span class="material-symbols-rounded">psychology</span>
                            <div>
                                <strong>Explain</strong>
                                <p>Quantum computing untuk pemula</p>
                            </div>
                        </button>
                        <button class="suggest-card" data-prompt="Buatkan puisi tentang kecerdasan buatan di masa depan">
                            <span class="material-symbols-rounded">edit_note</span>
                            <div>
                                <strong>Create</strong>
                                <p>Puisi tentang AI masa depan</p>
                            </div>
                        </button>
                        <button class="suggest-card" data-prompt="Analisis perbedaan React vs Vue.js secara teknis">
                            <span class="material-symbols-rounded">compare_arrows</span>
                            <div>
                                <strong>Analyze</strong>
                                <p>React vs Vue.js secara teknis</p>
                            </div>
                        </button>
                        <button class="suggest-card" data-prompt="Buat REST API sederhana dengan Node.js dan Express">
                            <span class="material-symbols-rounded">code</span>
                            <div>
                                <strong>Code</strong>
                                <p>REST API dengan Node.js</p>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-wrapper">
                <div class="input-container" id="inputContainer">
                    <textarea id="chatInput" placeholder="Ask Max AI anything..." rows="1" maxlength="10000"></textarea>
                    <div class="input-actions">
                        <!-- Mode Selector Button -->
                        <div class="mode-dropdown-wrapper">
                            <button class="mode-toggle-btn" id="modeToggleBtn" title="Select mode">
                                <span class="material-symbols-rounded mode-toggle-icon" id="modeIcon">biotech</span>
                                <span class="mode-toggle-label" id="modeLabel">Precise</span>
                                <span class="material-symbols-rounded chevron">expand_more</span>
                            </button>
                            <!-- Dropdown -->
                            <div class="mode-dropdown" id="modeDropdown">
                                <p class="dropdown-title">Select Mode</p>
                                <button class="mode-option" data-mode="creative">
                                    <div class="mode-opt-icon creative-icon">
                                        <span class="material-symbols-rounded">auto_awesome</span>
                                    </div>
                                    <div class="mode-opt-info">
                                        <span class="mode-opt-name">Creative</span>
                                        <span class="mode-opt-desc">Imaginative & expressive</span>
                                    </div>
                                </button>
                                <button class="mode-option active" data-mode="precise">
                                    <div class="mode-opt-icon precise-icon">
                                        <span class="material-symbols-rounded">biotech</span>
                                    </div>
                                    <div class="mode-opt-info">
                                        <span class="mode-opt-name">Precise</span>
                                        <span class="mode-opt-desc">Accurate & analytical</span>
                                    </div>
                                </button>
                                <button class="mode-option" data-mode="fast">
                                    <div class="mode-opt-icon fast-icon">
                                        <span class="material-symbols-rounded">bolt</span>
                                    </div>
                                    <div class="mode-opt-info">
                                        <span class="mode-opt-name">Fast</span>
                                        <span class="mode-opt-desc">Quick & concise responses</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <!-- Send Button -->
                        <button class="send-btn" id="sendBtn" disabled>
                            <span class="material-symbols-rounded">arrow_upward</span>
                        </button>
                    </div>
                </div>
                <p class="disclaimer">Max AI can make mistakes. Verify important information.</p>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast-box" id="toastBox"></div>

    <script src="script.js"></script>
</body>
</html>
