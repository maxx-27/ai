<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Max AI | Intelligent Interface</title>
    <meta name="description" content="Max AI - Premium AI Assistant powered by ChatGPT & Gemini. Creative, Precise, and Fast modes.">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed":"#d6e3ff","on-secondary-fixed":"#151b2d","on-surface-variant":"#c5c6cd",
              "inverse-on-surface":"#303032","on-primary-container":"#74829d","tertiary-fixed-dim":"#e7bf99",
              "on-primary-fixed":"#0d1c32","surface-container":"#1f1f21","on-primary":"#233148",
              "on-error-container":"#ffdad6","outline-variant":"#44474d",
              "on-secondary-fixed-variant":"#40465a","on-primary-fixed-variant":"#39475f",
              "inverse-surface":"#e4e2e4","on-secondary-container":"#b2b7d0","on-surface":"#e4e2e4",
              "surface-container-high":"#2a2a2c","surface-variant":"#343536","error":"#ffb4ab",
              "on-background":"#e4e2e4","tertiary-fixed":"#ffdcbd","error-container":"#93000a",
              "primary-container":"#0a192f","surface-tint":"#b9c7e4","secondary-fixed-dim":"#c0c6de",
              "secondary":"#c0c6de","outline":"#8f9097","on-tertiary-fixed-variant":"#5d4124",
              "on-tertiary-fixed":"#2b1701","surface":"#131315","surface-container-highest":"#343536",
              "surface-dim":"#131315","tertiary-container":"#281400","on-error":"#690005",
              "surface-container-low":"#1b1b1d","surface-bright":"#39393b",
              "surface-container-lowest":"#0e0e10","secondary-container":"#43485d",
              "on-tertiary-container":"#9d7b5a","background":"#131315","primary":"#b9c7e4",
              "on-tertiary":"#432b10","inverse-primary":"#515f78","tertiary":"#e7bf99",
              "on-secondary":"#2a3043","primary-fixed-dim":"#b9c7e4","secondary-fixed":"#dce1fb"
            },
            borderRadius: { DEFAULT:"0.25rem", lg:"0.5rem", xl:"0.75rem", full:"9999px" },
            spacing: { gutter:"24px", "margin-mobile":"20px", "margin-desktop":"64px", unit:"8px", "container-max":"1200px" },
            fontFamily: { "body-lg":["Inter"], "body-md":["Inter"], "label-sm":["Inter"], "display-lg":["Montserrat"], "headline-lg-mobile":["Montserrat"], "headline-lg":["Montserrat"] },
            fontSize: {
              "body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],
              "body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],
              "label-sm":["12px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],
              "display-lg":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"700"}],
              "headline-lg-mobile":["24px",{lineHeight:"1.2",fontWeight:"600"}],
              "headline-lg":["32px",{lineHeight:"1.2",fontWeight:"600"}]
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden selection:bg-primary/30 selection:text-primary">

    <!-- Global Background Gradients -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-secondary-container/10 rounded-full blur-[150px]"></div>
    </div>

    <!-- ============================================ -->
    <!-- SideNavBar                                   -->
    <!-- ============================================ -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full z-40 flex-col p-6 hidden md:flex bg-surface-container-lowest/80 backdrop-blur-2xl border-r border-white/10 shadow-2xl w-72">
        <div class="mb-10">
            <h1 class="font-display-lg text-headline-lg text-primary">Intelligence</h1>
            <p class="text-on-surface-variant font-label-sm uppercase tracking-widest mt-1">Active Session</p>
        </div>
        <nav class="flex-1 space-y-2">
            <button id="newThreadBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary border-r-2 border-primary font-body-md transition-all duration-200 hover:translate-x-1">
                <span class="material-symbols-outlined">add_circle</span>
                <span>New Thread</span>
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-white/5 font-body-md transition-all duration-200">
                <span class="material-symbols-outlined">category</span>
                <span>Workspaces</span>
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-white/5 font-body-md transition-all duration-200">
                <span class="material-symbols-outlined">auto_stories</span>
                <span>Library</span>
            </button>
            <button id="historyBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-white/5 font-body-md transition-all duration-200">
                <span class="material-symbols-outlined">history</span>
                <span>Archive</span>
            </button>
        </nav>
        <!-- Chat History (shown when Archive clicked) -->
        <div id="chatHistoryPanel" class="hidden flex-1 overflow-y-auto space-y-1 mt-2"></div>
        <div class="mt-auto space-y-4">
            <div id="apiStatusBar" class="w-full py-3 px-4 glass-panel rounded-xl flex items-center gap-3">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-outline"></span>
                <span id="statusLabel" class="text-label-sm text-on-surface-variant">Checking...</span>
            </div>
            <div class="pt-4 border-t border-white/5 space-y-1">
                <button class="w-full flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">help_outline</span>
                    <span class="text-label-sm">Help</span>
                </button>
                <button class="w-full flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">settings</span>
                    <span class="text-label-sm">Settings</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 hidden"></div>

    <!-- ============================================ -->
    <!-- TopNavBar                                    -->
    <!-- ============================================ -->
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-gutter py-4 backdrop-blur-xl bg-surface/30 md:pl-[312px]">
        <div class="flex items-center gap-4">
            <button id="mobileMenuBtn" class="md:hidden text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <span class="font-display-lg text-headline-lg-mobile tracking-tighter text-primary font-bold">Max AI</span>
        </div>
        <div class="flex items-center gap-4 text-on-surface-variant">
            <button id="clearAllBtn" class="hover:text-primary-fixed transition-colors duration-300" title="Clear chat">
                <span class="material-symbols-outlined">delete_sweep</span>
            </button>
            <button class="hover:text-primary-fixed transition-colors duration-300">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_circle</span>
            </button>
        </div>
    </header>

    <!-- ============================================ -->
    <!-- Main Content Area                            -->
    <!-- ============================================ -->
    <main class="relative h-screen flex flex-col md:pl-72 pt-16 pb-36 md:pb-32">
        <!-- Fluid AI Orb Background -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
            <div class="orb-gradient w-64 h-64 md:w-96 md:h-96 rounded-full ai-pulse opacity-40 blur-3xl"></div>
        </div>

        <!-- Chat Messages Scroll Area -->
        <div id="chatMessages" class="flex-1 overflow-y-auto px-gutter md:px-margin-desktop space-y-6 py-8 mask-fade-top relative z-10 scroll-smooth">
            
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="max-w-3xl mx-auto text-center space-y-6 pt-16 md:pt-20">
                <div class="orb-gradient w-24 h-24 rounded-full mx-auto ai-pulse flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary scale-150" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                </div>
                <h2 class="font-display-lg text-display-lg text-primary tracking-tight">How can I assist your evolution today?</h2>
                <div id="suggestionGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-xl mx-auto">
                    <button class="suggestion-card glass-panel p-4 rounded-2xl text-left hover:border-primary/40 transition-all group" data-prompt="Buatkan cerita pendek tentang petualangan di dunia AI masa depan">
                        <p class="text-label-sm text-primary mb-1">Creative</p>
                        <p class="text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Buatkan cerita pendek tentang petualangan di dunia AI masa depan.</p>
                    </button>
                    <button class="suggestion-card glass-panel p-4 rounded-2xl text-left hover:border-primary/40 transition-all group" data-prompt="Jelaskan perbedaan machine learning dan deep learning secara detail">
                        <p class="text-label-sm text-primary mb-1">Precise</p>
                        <p class="text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Jelaskan perbedaan machine learning dan deep learning secara detail.</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- Floating Input Area                          -->
        <!-- ============================================ -->
        <div class="fixed bottom-0 left-0 md:left-72 right-0 p-gutter md:p-8 z-40 pb-20 md:pb-8">
            <div class="max-w-4xl mx-auto relative">
                <div id="inputContainer" class="glass-panel rounded-3xl p-2 flex flex-col md:flex-row items-center gap-2 ring-1 ring-white/10 shadow-2xl input-glow-focus">
                    <div class="flex-1 flex items-center px-4 w-full">
                        <textarea id="chatInput" class="w-full bg-transparent border-none focus:ring-0 text-body-lg text-on-surface placeholder:text-on-surface-variant/40 py-4 resize-none max-h-[120px]" placeholder="Whisper your intent..." rows="1" maxlength="10000"></textarea>
                    </div>
                    <div class="flex items-center gap-2 w-full md:w-auto px-2 pb-2 md:pb-0">
                        <!-- Mode Selector -->
                        <div id="modeSelector" class="flex items-center bg-surface-container-low/40 rounded-2xl px-2 py-1 gap-1 border border-white/5">
                            <button class="mode-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-on-surface-variant/60 hover:text-on-surface transition-all text-label-sm" data-mode="creative">
                                <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                                <span>Creative</span>
                            </button>
                            <button class="mode-btn active flex items-center gap-1.5 px-4 py-1.5 rounded-xl bg-primary text-on-primary font-bold transition-all text-label-sm scale-105 shadow-lg" data-mode="precise">
                                <span class="material-symbols-outlined text-[18px]">biotech</span>
                                <span>Precise</span>
                            </button>
                            <button class="mode-btn flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-on-surface-variant/60 hover:text-on-surface transition-all text-label-sm" data-mode="fast">
                                <span class="material-symbols-outlined text-[18px]">bolt</span>
                                <span>Fast</span>
                            </button>
                        </div>
                        <!-- Send Button -->
                        <button id="sendBtn" class="bg-primary text-on-primary h-12 w-12 rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg disabled:opacity-30 disabled:hover:scale-100" disabled>
                            <span class="material-symbols-outlined">arrow_upward</span>
                        </button>
                    </div>
                </div>
                <!-- Status Badge -->
                <div class="mt-3 flex justify-center items-center gap-3">
                    <span id="inputStatusDot" class="w-2 h-2 rounded-full bg-primary ai-pulse"></span>
                    <span id="inputStatusText" class="text-label-sm text-on-surface-variant tracking-[0.2em] uppercase">System Coherent &amp; Ready</span>
                </div>
            </div>
        </div>
    </main>

    <!-- ============================================ -->
    <!-- BottomNavBar (Mobile Only)                   -->
    <!-- ============================================ -->
    <nav id="mobileNav" class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin-mobile py-4 md:hidden backdrop-blur-2xl border-t border-white/5 bg-surface-container-low/40">
        <button class="mobile-mode-btn flex flex-col items-center justify-center text-on-surface-variant/60" data-mode="creative">
            <span class="material-symbols-outlined">auto_awesome</span>
            <span class="font-label-sm text-label-sm">Creative</span>
        </button>
        <button class="mobile-mode-btn active flex flex-col items-center justify-center bg-primary text-on-primary rounded-full px-6 py-1 scale-110 shadow-xl" data-mode="precise">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">biotech</span>
            <span class="font-label-sm text-label-sm">Precise</span>
        </button>
        <button class="mobile-mode-btn flex flex-col items-center justify-center text-on-surface-variant/60" data-mode="fast">
            <span class="material-symbols-outlined">bolt</span>
            <span class="font-label-sm text-label-sm">Fast</span>
        </button>
    </nav>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-20 right-6 z-[999] flex flex-col gap-3"></div>

    <!-- Subtle Texture Overlay -->
    <div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[100]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDIGOIN8YcsjbHCyzgN9bp9ZMh0hYv_FgAbLCqK1dQ2gzkVFqnq_Q4hkak9PP3oKRQi6tpQnU83f9VWEV5hwm_pwb7Pjp4gjH8PNNFEodFXV2Ew5JJMuSVcO9r37GLhwwGGczQB3wE0h3AgHsMppAirFOZ-y_RQwGcEBiR5tZ5wk_1_q3qviHnDLvdZAWdhORhvq3f6rUJEhvy_NMfUge6y8e87OnkpaVlZUg1TSq6ey9uK9BJ6nviuvcLAs1aAKpK7UuRUsvuJuS4');"></div>

    <script src="script.js"></script>
</body>
</html>
